name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          Restart-Service -Name TermService -Force

      - name: Disable Password Policy & Create RDP User
        run: |
          # 1. পাসওয়ার্ড পলিসি ফাইল এক্সপোর্ট করা
          secedit /export /cfg C:\secpol.cfg
          
          # 2. পাসওয়ার্ড কমপ্লেক্সিটি বন্ধ করা (অবশ্যই Unicode এনকোডিং ব্যবহার করতে হবে)
          (Get-Content C:\secpol.cfg) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' -replace 'MinimumPasswordLength = 7', 'MinimumPasswordLength = 0' | Set-Content C:\secpol.cfg -Encoding Unicode
          
          # 3. মডিফাই করা পলিসি সিস্টেমে অ্যাপ্লাই করা
          secedit /configure /db C:\windows\security\local.sdb /cfg C:\secpol.cfg /areas SECURITYPOLICY
          
          # 4. পলিসি আপডেট ফোর্স করা
          gpupdate /force
          
          $username = "Oclavia"
          $password = "Oclavian_Miraj"
          
          # 5. আগে থেকে ইউজার থাকলে সেফলি ডিলিট করা (কোনো লাল এরর দেখাবে না)
          try {
              if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
                  Remove-LocalUser -Name $username -Force
              }
          } catch {}
          
          # 6. নতুন ইউজার তৈরি করা
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          
          echo "RDP_USER=$username" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install ngrok
        run: |
          choco install ngrok -y

      - name: Start ngrok Tunnel
        run: |
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          Start-Process ngrok -ArgumentList "tcp 3389" -WindowStyle Hidden

      - name: Get ngrok URL
        run: |
          Start-Sleep -Seconds 10
          $ngrokTunnel = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $publicUrl = $ngrokTunnel.tunnels[0].public_url
          
          Write-Host "`n=== RDP ACCESS INFO ==="
          Write-Host "Address: $publicUrl"
          Write-Host "Username: Oclavia"
          Write-Host "Password: Oclavian_Miraj"
          Write-Host "=======================`n"

      - name: Maintain Connection
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active..."
            Start-Sleep -Seconds 300
          }
